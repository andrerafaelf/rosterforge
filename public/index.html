<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>RosterForge</title>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<main class="shell">
			<header class="hero">
				<p class="eyebrow">RosterForge</p>
				<h1>Weekly coverage without spreadsheet fog.</h1>
				<p>Plan shifts, review time-off requests, and spot under-staffed days from one small self-hosted app.</p>
			</header>

			<section class="grid">
				<form id="shift-form" class="panel">
					<h2>Add shift</h2>
					<label>Person <input name="person" required placeholder="Ana" /></label>
					<label>Role <input name="role" required placeholder="Support" /></label>
					<label>Date <input name="date" type="date" required /></label>
					<div class="split">
						<label>Start <input name="start" type="time" required /></label>
						<label>End <input name="end" type="time" required /></label>
					</div>
					<button type="submit">Create shift</button>
					<p id="form-status" class="status"></p>
				</form>

				<section class="panel">
					<h2>Coverage</h2>
					<div id="coverage" class="coverage"></div>
				</section>
			</section>

			<section class="grid lower">
				<section class="panel">
					<h2>Upcoming shifts</h2>
					<div id="shifts" class="list"></div>
				</section>
				<section class="panel">
					<h2>Time-off queue</h2>
					<div id="requests" class="list"></div>
				</section>
			</section>
		</main>
		<script src="app.js" type="module"></script>
	</body>
</html>
